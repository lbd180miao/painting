<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库迁移未完成</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }
        .wrap {
            max-width: 720px;
            margin: 10vh auto;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
            border: 1px solid #e5e7eb;
        }
        h1 {
            margin-top: 0;
            font-size: 28px;
        }
        p {
            line-height: 1.7;
        }
        code {
            display: block;
            margin: 16px 0;
            padding: 14px 16px;
            background: #111827;
            color: #f9fafb;
            border-radius: 10px;
            font-size: 15px;
            overflow-x: auto;
        }
        .hint {
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>检测到未执行的数据库迁移</h1>
            <p>当前代码已经依赖新的数据库字段，但本地数据库结构还没更新。为避免继续出现 <code>no such column</code> 这类错误，系统已暂时阻止页面请求。</p>
            <p>请在项目根目录执行下面这条命令：</p>
            <code>python manage.py migrate</code>
            <p class="hint">执行完成后刷新页面即可。如果仍有问题，再执行 <code>python manage.py showmigrations</code> 检查是否还有未应用的迁移。</p>
        </div>
    </div>
</body>
</html>
