{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %}{{ page_title }} - 涂装生产排程管理系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="card-title mb-0">{{ page_title }}</h3>
                <a href="javascript:history.back()" class="btn btn-sm btn-secondary">返回</a>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next_url }}">
                    {% bootstrap_form form %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">{{ submit_label }}</button>
                        <a href="javascript:history.back()" class="btn btn-light">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
