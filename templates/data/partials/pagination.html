{% if page_obj and page_obj.paginator.num_pages > 1 %}
<div class="card-footer d-flex justify-content-between align-items-center">
    <div class="text-muted">第 {{ page_obj.number }} / {{ page_obj.paginator.num_pages }} 页</div>
    <div class="btn-list">
        {% if page_obj.has_previous %}
        <a href="?page={{ page_obj.previous_page_number }}{% if filters.q %}&q={{ filters.q }}{% endif %}{% if filters.vehicle %}&vehicle={{ filters.vehicle }}{% endif %}{% if filters.color %}&color={{ filters.color }}{% endif %}{% if filters.import_batch %}&import_batch={{ filters.import_batch }}{% endif %}" class="btn btn-outline-secondary btn-sm">上一页</a>
        {% endif %}
        {% if page_obj.has_next %}
        <a href="?page={{ page_obj.next_page_number }}{% if filters.q %}&q={{ filters.q }}{% endif %}{% if filters.vehicle %}&vehicle={{ filters.vehicle }}{% endif %}{% if filters.color %}&color={{ filters.color }}{% endif %}{% if filters.import_batch %}&import_batch={{ filters.import_batch }}{% endif %}" class="btn btn-outline-secondary btn-sm">下一页</a>
        {% endif %}
    </div>
</div>
{% endif %}
