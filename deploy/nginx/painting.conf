# Nginx site config for the "painting" Django project.
#
# 使用前请替换以下占位符：
#   your-domain.com         -> 实际域名
#   /var/www/painting       -> 项目部署目录（含 manage.py 的目录）
#   /etc/letsencrypt/...    -> 实际 SSL 证书路径
#
# 假设后端用 gunicorn 监听 unix socket：
#   gunicorn painting.wsgi:application \
#       --bind unix:/run/painting/gunicorn.sock \
#       --workers 3
#
# Django 端需先执行 `python manage.py collectstatic`，
# 静态文件会输出到 STATIC_ROOT = BASE_DIR/staticfiles。

upstream painting_app {
    server unix:/run/painting/gunicorn.sock fail_timeout=0;
    # 如果用 TCP，改为：
    # server 127.0.0.1:8000 fail_timeout=0;
}

# HTTP -> HTTPS 跳转
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # 给 certbot 的 ACME 校验留出口（按需启用）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全相关响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 上传大小（导入 Excel/图片等场景按需调整）
    client_max_body_size 50m;

    # 日志
    access_log /var/log/nginx/painting.access.log;
    error_log  /var/log/nginx/painting.error.log warn;

    # 静态文件：对应 Django settings.STATIC_ROOT
    location /static/ {
        alias /var/www/painting/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 媒体文件：对应 Django settings.MEDIA_ROOT
    location /media/ {
        alias /var/www/painting/media/;
        access_log off;
        expires 7d;
    }

    # favicon / robots 静默
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # 反向代理到 gunicorn
    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_redirect off;
        proxy_buffering on;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        proxy_pass http://painting_app;
    }
}
